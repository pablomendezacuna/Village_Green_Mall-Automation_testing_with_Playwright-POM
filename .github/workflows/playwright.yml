name: Playwright Tests
on:
  push:
    branches: [ main, master, stagebranch ]
  # This section enables the manual trigger button in the Actions tab
  workflow_dispatch:
    inputs:
      queries:
        description: 'Manual queries (e.g., nike, shoes). Leave empty to use Queries.json'
        required: false
        default: ''

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').dependencies['@playwright/test'].version)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Pass GitHub Secrets to Environment Variables
        MALL_HTTP_USER: ${{ secrets.MALL_USERNAME }}
        MALL_HTTP_PASSWORD: ${{ secrets.MALL_PASSWORD }}
        # Pass the manual input from the UI to the test script
        MANUAL_QUERIES: ${{ github.event.inputs.queries }}

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reporte-automatizacion-malls
        path: playwright-report/
        retention-days: 7