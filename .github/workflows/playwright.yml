name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      # El '|| true' asegura que el reporte se genere aunque los tests fallen
      run: npx playwright test || true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always() # CRÍTICO: Se ejecuta aunque los tests fallen
      with:
        name: reporte-automatizacion-malls
        # IMPORTANTE: Subimos TODA la carpeta del reporte.
        # Esto incluye: index.html y la carpeta 'data/' con fotos/videos.
        path: playwright-report/
        retention-days: 7