name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      mall_indices:
        description: 'Índices de AllCanadianMalls (ej: 0,33). Vacío para MyMalls.'
        required: false
        default: ''
      queries:
        description: 'Queries separadas por coma'
        required: true
        default: 'shoes'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      MALL_INDICES: ${{ github.event.inputs.mall_indices }}
      QUERIES: ${{ github.event.inputs.queries }}
      MALL_HTTP_USER: ${{ secrets.MALL_HTTP_USER }}
      MALL_HTTP_PASSWORD: ${{ secrets.MALL_HTTP_PASSWORD }}
      CI: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      
      # SUBIR REPORTE COMPLETO (CON FOTOS)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30